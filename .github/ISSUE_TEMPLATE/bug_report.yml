name: Bug report
description: Report incorrect behavior, validation failure, or compatibility issue.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include confidential experiment data or security reports.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.2.0
    validations:
      required: true
  - type: dropdown
    id: harness
    attributes:
      label: Harness
      options:
        - Codex
        - Claude Code
        - Antigravity (agy)
        - Repository tooling
        - Multiple
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed and expected behavior
      description: State what happened and what should have happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Remove proprietary data, credentials, and personal information.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, harness version, install method, and relevant command output
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true
